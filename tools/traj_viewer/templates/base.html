<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Trajectory Viewer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('home') }}" class="brand">ALFWorld Trajectory Viewer</a>

  </header>
  <main>

</body>
</html>
